    <!-- App height strategy:
         - Installed PWA (standalone): the web view IS the whole screen and the
           status bar is translucent (full-bleed), so let CSS 100vh fill it. Do
           NOT use window.innerHeight here — iOS reports it 44px short (the status
           bar), which would leave a dark gap at the BOTTOM.
         - In-browser (Safari/Chrome): window.innerHeight is the reliable visible
           area between the toolbars; use it so the app isn't cut off by chrome. -->
    <script>
      (function () {
        function isStandalone() {
          return window.navigator.standalone === true
            || window.matchMedia('(display-mode: standalone)').matches;
        }
        function setAppHeight() {
          if (isStandalone()) {
            document.documentElement.style.removeProperty('--app-height'); // CSS 100vh fills the screen
          } else {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', function () { setTimeout(setAppHeight, 300); });
        window.addEventListener('pageshow', setAppHeight);
      })();
    </script>
